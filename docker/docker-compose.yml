# Демо/дев-стек одной командой. Прод-кластер (2× app + реплика БД + LB) — см. docs/ARCHITECTURE.md
name: corp-lms

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${MOODLE_DB_NAME:-moodle}
      POSTGRES_USER: ${MOODLE_DB_USER:-moodle}
      POSTGRES_PASSWORD: ${MOODLE_DB_PASS:-moodle}
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MOODLE_DB_USER:-moodle}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MOODLE_BRANCH: ${MOODLE_BRANCH:-MOODLE_405_STABLE}
    environment:
      MOODLE_WWWROOT: ${MOODLE_WWWROOT:-http://localhost:8080}
      MOODLE_DB_HOST: db
      MOODLE_DB_PORT: 5432
      MOODLE_DB_NAME: ${MOODLE_DB_NAME:-moodle}
      MOODLE_DB_USER: ${MOODLE_DB_USER:-moodle}
      MOODLE_DB_PASS: ${MOODLE_DB_PASS:-moodle}
      MOODLE_REDIS_HOST: cache
      MOODLE_REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - moodledata:/var/moodledata

  # Headless-фронт (Next.js). Серверная часть ходит в Moodle по внутренней сети (http://app),
  # браузер Windows открывает фронт на :3000. Токен живёт только на сервере фронта.
  frontend:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    environment:
      MOODLE_WS_BASE: http://app
      MOODLE_WS_HOST: ${MOODLE_WWWROOT_HOST:-localhost:8080}
      MOODLE_WS_TOKEN: ${MOODLE_WS_TOKEN:-}
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - app

volumes:
  dbdata:
  moodledata:
  frontend_node_modules:
